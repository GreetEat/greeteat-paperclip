name: Build Paperclip image

# =============================================================================
# Builds the Paperclip container image from upstream Paperclip's OFFICIAL
# Dockerfile (https://github.com/paperclipai/paperclip/blob/master/Dockerfile)
# at the pinned release tag and pushes it to Artifact Registry in the
# paperclip-492823 GCP project.
#
# Why we don't maintain our own Dockerfile:
#   Paperclip's upstream Dockerfile is non-trivial — it builds three
#   workspaces in order (@paperclipai/ui, @paperclipai/plugin-sdk,
#   @paperclipai/server), installs the Claude Code / Codex / OpenCode CLIs
#   globally so the spawned-subprocess agents work, and ships an entrypoint
#   that remaps the node user UID/GID to match the volume mount. Inheriting
#   their Dockerfile means we get all of that for free, including any future
#   upstream changes.
#
# What this workflow does:
#   1. Checks out THIS deployment-spec repo (for versions.auto.tfvars)
#   2. Determines the paperclip_version to build (from workflow input or
#      versions.auto.tfvars)
#   3. Clones upstream Paperclip at the exact pinned tag
#   4. Authenticates to GCP via project-scoped Workload Identity Federation
#   5. Builds the image using upstream's Dockerfile in the cloned tree
#   6. Scans with Trivy (HIGH/CRITICAL fail-on-no-fix)
#   7. Pushes to Artifact Registry with both <version> and <git-sha> tags
#   8. Outputs the immutable digest in the workflow summary so the operator
#      can paste it into versions.tfvars
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      paperclip_version:
        description: "Upstream Paperclip release tag to build (e.g. v0.42.0)"
        required: true
        type: string
  pull_request:
    paths:
      - "infra/envs/prod/versions.auto.tfvars"
      - ".github/workflows/build-image.yml"

env:
  GCP_PROJECT_ID:           paperclip-492823
  GCP_PROJECT_NUMBER:       "280667224791"
  GCP_REGION:               us-central1
  ARTIFACT_REGISTRY_REPO:   paperclip
  IMAGE_NAME:               paperclip
  WIF_SERVICE_ACCOUNT:      paperclip-github-actions@paperclip-492823.iam.gserviceaccount.com
  PAPERCLIP_REPO:           https://github.com/paperclipai/paperclip.git

permissions:
  contents:        read
  id-token:        write    # required for WIF
  pull-requests:   write    # to post the digest as a PR comment

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this deployment-spec repo
        uses: actions/checkout@v4

      - name: Determine paperclip_version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.paperclip_version }}" ]; then
            ver="${{ github.event.inputs.paperclip_version }}"
          else
            ver=$(grep -E '^paperclip_version' infra/envs/prod/versions.auto.tfvars \
              | sed -E 's/.*"([^"]+)".*/\1/')
          fi
          if [ -z "$ver" ] || [ "$ver" = "TBD" ]; then
            echo "ERROR: paperclip_version is not set (currently '$ver')" >&2
            exit 1
          fi
          echo "paperclip_version=$ver" >> "$GITHUB_OUTPUT"
          echo "Building Paperclip $ver"

      - name: Clone upstream Paperclip at pinned tag
        run: |
          git clone \
            --depth 1 \
            --branch "${{ steps.version.outputs.paperclip_version }}" \
            "${{ env.PAPERCLIP_REPO }}" \
            paperclip-source
          ls -la paperclip-source/Dockerfile

      - name: Authenticate to GCP via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/paperclip-github/providers/github
          service_account:            ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image from upstream Dockerfile
        run: |
          IMAGE_URL="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}"
          cd paperclip-source
          docker build \
            -t "$IMAGE_URL:${{ steps.version.outputs.paperclip_version }}" \
            -t "$IMAGE_URL:${{ github.sha }}" \
            .
          echo "image_url=$IMAGE_URL" >> "$GITHUB_ENV"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref:    ${{ env.image_url }}:${{ github.sha }}
          format:       table
          severity:     HIGH,CRITICAL
          exit-code:    "1"
          ignore-unfixed: true

      - name: Push image
        run: |
          docker push "${{ env.image_url }}:${{ steps.version.outputs.paperclip_version }}"
          docker push "${{ env.image_url }}:${{ github.sha }}"

      - name: Get immutable digest
        id: digest
        run: |
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' \
            "${{ env.image_url }}:${{ github.sha }}" | sed 's/.*@//')
          if [ -z "$digest" ]; then
            echo "ERROR: failed to extract digest from docker inspect" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Image digest: $digest"

      - name: Output digest summary
        run: |
          {
            echo "## Paperclip image built (from upstream Dockerfile)"
            echo ""
            echo "- **Upstream version**: \`${{ steps.version.outputs.paperclip_version }}\`"
            echo "- **Source**: ${{ env.PAPERCLIP_REPO }} @ ${{ steps.version.outputs.paperclip_version }}"
            echo "- **Digest**: \`${{ steps.digest.outputs.digest }}\`"
            echo "- **Image URL**: \`${{ env.image_url }}@${{ steps.digest.outputs.digest }}\`"
            echo ""
            echo "### Next step"
            echo ""
            echo "Update \`infra/envs/prod/versions.auto.tfvars\`:"
            echo ""
            echo '```hcl'
            echo "paperclip_version      = \"${{ steps.version.outputs.paperclip_version }}\""
            echo "paperclip_image_digest = \"${{ steps.digest.outputs.digest }}\""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
