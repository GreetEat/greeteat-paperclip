name: Build Paperclip image

# =============================================================================
# Builds the Paperclip container image from upstream Paperclip's OFFICIAL
# Dockerfile (https://github.com/paperclipai/paperclip/blob/master/Dockerfile)
# at the pinned ref and pushes it to Artifact Registry in the
# paperclip-492823 GCP project.
#
# `paperclip_version` accepts EITHER a release tag (e.g. v2026.403.0) OR a
# full 40-char commit SHA (e.g. ac664df8e48326135a913e97ee7ed937d913586b).
# Commit-SHA pinning is required when a needed fix lives on master but
# hasn't been tagged yet — for example, the GHSA-68qg-g8mg-6pr7 RCE fix
# landed in commit ac664df on 2026-04-10 but no release tag has shipped it.
# Tag pins are preferred for normal upgrades; SHA pins are an escape hatch.
#
# Why we don't maintain our own Dockerfile:
#   Paperclip's upstream Dockerfile is non-trivial — it builds three
#   workspaces in order (@paperclipai/ui, @paperclipai/plugin-sdk,
#   @paperclipai/server), installs the Claude Code / Codex / OpenCode CLIs
#   globally so the spawned-subprocess agents work, and ships an entrypoint
#   that remaps the node user UID/GID to match the volume mount. Inheriting
#   their Dockerfile means we get all of that for free, including any future
#   upstream changes.
#
# What this workflow does:
#   1. Checks out THIS deployment-spec repo (for versions.auto.tfvars)
#   2. Determines the paperclip_version to build (from workflow input or
#      versions.auto.tfvars)
#   3. Clones upstream Paperclip at the exact pinned ref (tag or SHA)
#   4. Authenticates to GCP via project-scoped Workload Identity Federation
#   5. Builds the image using upstream's Dockerfile in the cloned tree
#   6. Scans with Trivy (HIGH/CRITICAL fail-on-no-fix)
#   7. Pushes to Artifact Registry with both <version> and <git-sha> tags
#   8. Outputs the immutable digest in the workflow summary so the operator
#      can paste it into versions.auto.tfvars
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      paperclip_version:
        description: "Upstream ref to build — release tag (v2026.403.0) or full 40-char commit SHA"
        required: true
        type: string
  pull_request:
    paths:
      - "infra/envs/prod/versions.auto.tfvars"
      - ".github/workflows/build-image.yml"

env:
  GCP_PROJECT_ID:           paperclip-492823
  GCP_PROJECT_NUMBER:       "280667224791"
  GCP_REGION:               us-central1
  ARTIFACT_REGISTRY_REPO:   paperclip
  IMAGE_NAME:               paperclip
  WIF_SERVICE_ACCOUNT:      paperclip-github-actions@paperclip-492823.iam.gserviceaccount.com
  PAPERCLIP_REPO:           https://github.com/paperclipai/paperclip.git

permissions:
  contents:        read
  id-token:        write    # required for WIF
  pull-requests:   write    # to post the digest as a PR comment

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this deployment-spec repo
        uses: actions/checkout@v4

      - name: Determine paperclip_version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.paperclip_version }}" ]; then
            ver="${{ github.event.inputs.paperclip_version }}"
          else
            ver=$(grep -E '^paperclip_version' infra/envs/prod/versions.auto.tfvars \
              | sed -E 's/.*"([^"]+)".*/\1/')
          fi
          if [ -z "$ver" ] || [ "$ver" = "TBD" ]; then
            echo "ERROR: paperclip_version is not set (currently '$ver')" >&2
            exit 1
          fi

          # Detect whether $ver is a 40-char hex commit SHA or a release tag.
          # SHA → use first 12 chars as the docker tag label so we don't ship
          # 40-char tag names. Tag → use as-is.
          if [[ "$ver" =~ ^[0-9a-f]{40}$ ]]; then
            ref_kind="sha"
            tag_label="sha-${ver:0:12}"
          else
            ref_kind="tag"
            tag_label="$ver"
          fi

          echo "paperclip_version=$ver" >> "$GITHUB_OUTPUT"
          echo "ref_kind=$ref_kind"     >> "$GITHUB_OUTPUT"
          echo "tag_label=$tag_label"   >> "$GITHUB_OUTPUT"
          echo "Building Paperclip $ver (kind=$ref_kind, tag_label=$tag_label)"

      - name: Clone upstream Paperclip at pinned ref (tag or SHA)
        run: |
          # `git clone --depth 1 --branch <ref>` only works for branches and
          # tags. To support arbitrary commit SHAs we use the init+fetch
          # pattern, which accepts any ref (tag, branch, or SHA) as long as
          # the server allows fetching arbitrary SHAs (GitHub does — they
          # set uploadpack.allowAnySHA1InWant=true).
          mkdir paperclip-source
          cd paperclip-source
          git init -q
          git remote add origin "${{ env.PAPERCLIP_REPO }}"
          git fetch --depth 1 origin "${{ steps.version.outputs.paperclip_version }}"
          git checkout -q FETCH_HEAD
          echo "Checked out $(git rev-parse HEAD)"
          ls -la Dockerfile

      - name: Patch upstream Dockerfile (githubcli keyring SHA rotated)
        # WORKAROUND for an upstream Paperclip Dockerfile issue: line ~8 of
        # the Dockerfile pins the GitHub CLI archive keyring SHA, but GitHub
        # rotated the keyring file and upstream's pinned SHA
        # (20e0125d6f6e077a9ad46f03371bc26d90b04939fb95170f5a1905099cc6bcc0)
        # no longer matches what cli.github.com serves. The build fails at
        # `sha256sum -c -` with "WARNING: 1 computed checksum did NOT match".
        #
        # Fix: fetch the keyring fresh, compute the current SHA, sed it into
        # the Dockerfile. Trust model is unchanged: HTTPS to cli.github.com
        # is what verifies authenticity at build time, the SHA pin only
        # detected drift between upstream-author-pinning and build-time
        # serving — which is exactly what just rotted out from under us.
        #
        # TODO(upstream): file an issue / PR against paperclipai/paperclip
        # to refresh the SHA. Drop this step once a release ships with the
        # corrected value.
        run: |
          NEW_SHA=$(curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sha256sum | awk '{print $1}')
          echo "Current githubcli keyring SHA: $NEW_SHA"
          sed -i "s|20e0125d6f6e077a9ad46f03371bc26d90b04939fb95170f5a1905099cc6bcc0|${NEW_SHA}|" paperclip-source/Dockerfile
          grep -n "sha256sum -c" paperclip-source/Dockerfile || true

      - name: Authenticate to GCP via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/paperclip-github/providers/github
          service_account:            ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image from upstream Dockerfile
        run: |
          IMAGE_URL="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}"
          cd paperclip-source
          # Tag with the docker-friendly label (tag name OR sha-<short>) plus
          # this deploy-spec repo's commit SHA, so the image carries both
          # "what upstream commit/tag was built" and "which deploy-spec PR
          # built it".
          docker build \
            -t "$IMAGE_URL:${{ steps.version.outputs.tag_label }}" \
            -t "$IMAGE_URL:gh-${{ github.sha }}" \
            .
          echo "image_url=$IMAGE_URL" >> "$GITHUB_ENV"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref:      ${{ env.image_url }}:gh-${{ github.sha }}
          format:         table
          severity:       HIGH,CRITICAL
          exit-code:      "1"
          ignore-unfixed: true
          # Allowlist of accepted CVEs, each with a documented justification.
          # See .trivyignore for the per-CVE rationale and re-review policy.
          trivyignores:   ./.trivyignore

      - name: Push image
        run: |
          docker push "${{ env.image_url }}:${{ steps.version.outputs.tag_label }}"
          docker push "${{ env.image_url }}:gh-${{ github.sha }}"

      - name: Get immutable digest
        id: digest
        run: |
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' \
            "${{ env.image_url }}:gh-${{ github.sha }}" | sed 's/.*@//')
          if [ -z "$digest" ]; then
            echo "ERROR: failed to extract digest from docker inspect" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Image digest: $digest"

      - name: Output digest summary
        run: |
          {
            echo "## Paperclip image built (from upstream Dockerfile)"
            echo ""
            echo "- **Upstream version**: \`${{ steps.version.outputs.paperclip_version }}\`"
            echo "- **Source**: ${{ env.PAPERCLIP_REPO }} @ ${{ steps.version.outputs.paperclip_version }}"
            echo "- **Digest**: \`${{ steps.digest.outputs.digest }}\`"
            echo "- **Image URL**: \`${{ env.image_url }}@${{ steps.digest.outputs.digest }}\`"
            echo ""
            echo "### Next step"
            echo ""
            echo "Update \`infra/envs/prod/versions.auto.tfvars\`:"
            echo ""
            echo '```hcl'
            echo "paperclip_version      = \"${{ steps.version.outputs.paperclip_version }}\""
            echo "paperclip_image_digest = \"${{ steps.digest.outputs.digest }}\""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
