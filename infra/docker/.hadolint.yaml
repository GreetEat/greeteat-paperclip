# Hadolint configuration for the Paperclip Dockerfile.
#
# Run from the repo root as:
#   hadolint --config infra/docker/.hadolint.yaml infra/docker/Dockerfile
#
# Or hooked into PR-time CI via .github/workflows/terraform-plan.yml (T065).

# Trusted registries — only allow our Artifact Registry repo to be referenced
trustedRegistries:
  - us-central1-docker.pkg.dev

# Fail on warnings as well as errors in CI
failure-threshold: warning

# Rule overrides (add with justification only)
ignored:
  # DL3008 — pin versions in apt-get install. Will reconsider if we end up
  # using apt at all in the multi-stage build (distroless target should not).
  - DL3008
